<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notas by Jesse</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary-dark: #0A0A0A;
      --bg-secondary-dark: #111111;
      --bg-tertiary-dark: #1A1A1A;
      --card-bg-dark: #111111;
      --text-primary-dark: #FFFFFF;
      --text-secondary-dark: #CCCCCC;
      --text-tertiary-dark: #888888;
      --border-color-dark: #222222;
      --accent-dark: #0066E0;
      --accent-hover-dark: #3385FF;
      --scrollbar-thumb-dark: #0066E0;
      --scrollbar-track-dark: #1A1A1A;
      
      --bg-primary-light: #FFFFFF;
      --bg-secondary-light: #F8F8F8;
      --bg-tertiary-light: #F0F0F0;
      --card-bg-light: #FFFFFF;
      --text-primary-light: #1A1A1A;
      --text-secondary-light: #4A4A4A;
      --text-tertiary-light: #888888;
      --border-color-light: #E5E5E5;
      --accent-light: #0066E0;
      --accent-hover-light: #3385FF;
      --scrollbar-thumb-light: #0066E0;
      --scrollbar-track-light: #E5E5E5;
      
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.15);
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Gotham', Helvetica, Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    body.theme-dark {
      --bg-primary: var(--bg-primary-dark);
      --bg-secondary: var(--bg-secondary-dark);
      --bg-tertiary: var(--bg-tertiary-dark);
      --card-bg: var(--card-bg-dark);
      --text-primary: var(--text-primary-dark);
      --text-secondary: var(--text-secondary-dark);
      --text-tertiary: var(--text-tertiary-dark);
      --border-color: var(--border-color-dark);
      --accent: var(--accent-dark);
      --accent-hover: var(--accent-hover-dark);
      --scrollbar-thumb: var(--scrollbar-thumb-dark);
      --scrollbar-track: var(--scrollbar-track-dark);
    }

    body.theme-light {
      --bg-primary: var(--bg-primary-light);
      --bg-secondary: var(--bg-secondary-light);
      --bg-tertiary: var(--bg-tertiary-light);
      --card-bg: var(--card-bg-light);
      --text-primary: var(--text-primary-light);
      --text-secondary: var(--text-secondary-light);
      --text-tertiary: var(--text-tertiary-light);
      --border-color: var(--border-color-light);
      --accent: var(--accent-light);
      --accent-hover: var(--accent-hover-light);
      --scrollbar-thumb: var(--scrollbar-thumb-light);
      --scrollbar-track: var(--scrollbar-track-light);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }

    .app {
      display: flex;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    .form-area {
      flex: 1;
      overflow-y: auto;
      padding: 32px 40px;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }

    .form-area::-webkit-scrollbar {
      width: 6px;
    }

    .form-area::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 10px;
    }

    .form-area::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    .form-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 32px;
      padding-bottom: 20px;
      border-bottom: 2px solid var(--accent);
    }

    .title-section h1 {
      font-size: 32px;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), #3385FF);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 13px;
      color: var(--text-tertiary);
      font-weight: 400;
    }

    .theme-toggle {
      background: none;
      border: none;
      cursor: pointer;
      font-size: 14px;
      padding: 8px 12px;
      margin-left: 16px;
      color: var(--text-secondary);
      flex-shrink: 0;
      font-weight: 500;
      border-radius: 20px;
      transition: background 0.2s;
    }

    .theme-toggle:hover {
      background: var(--bg-tertiary);
    }

    .cards-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 20px 24px;
      border: 1px solid var(--border-color);
      transition: all 0.2s ease;
    }

    .card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
      border-left: 3px solid var(--accent);
      padding-left: 12px;
    }

    .card-header span:first-child {
      font-size: 18px;
    }

    textarea, select {
      width: 100%;
      padding: 12px 14px;
      font-size: 13px;
      font-family: inherit;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      transition: all 0.2s ease;
      resize: vertical;
    }

    textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0, 102, 224, 0.1);
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 10px;
    }

    .checkbox-group label {
      font-size: 12px;
      color: var(--text-secondary);
      cursor: pointer;
    }

    input[type="checkbox"] {
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: var(--accent);
    }

    .field-with-checkbox {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .field-with-checkbox textarea {
      flex: 1;
    }

    .sidebar {
      width: 500px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border-color);
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      padding: 32px;
      gap: 24px;
      flex-shrink: 0;
      scrollbar-width: thin;
      scrollbar-color: var(--scrollbar-thumb) var(--scrollbar-track);
    }

    .sidebar::-webkit-scrollbar {
      width: 6px;
    }

    .sidebar::-webkit-scrollbar-track {
      background: var(--scrollbar-track);
      border-radius: 10px;
    }

    .sidebar::-webkit-scrollbar-thumb {
      background: var(--scrollbar-thumb);
      border-radius: 10px;
    }

    .result-card, .notes-card {
      background: var(--card-bg);
      border-radius: 16px;
      padding: 24px;
      border: 1px solid var(--border-color);
    }

    .card-header-sidebar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      font-weight: 600;
      font-size: 16px;
      color: var(--accent);
    }

    #resultado {
      width: 100%;
      min-height: 440px;
      font-family: 'SF Mono', 'Monaco', monospace;
      font-size: 12px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 12px;
      resize: vertical;
      line-height: 1.6;
    }

    .notes-card textarea {
      min-height: 178px;
      resize: vertical;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      background: var(--accent);
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 40px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: inherit;
      flex: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    button:hover {
      background: var(--accent-hover);
      transform: translateY(-1px);
    }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
    }

    .btn-success {
      background: #00A86B;
    }

    .btn-success:hover {
      background: #008F5A;
    }

    @media (max-width: 900px) {
      .app { flex-direction: column; }
      .sidebar { width: 100%; max-height: 45vh; }
      .form-area { max-height: 55vh; padding: 20px; }
    }
  </style>
</head>
<body class="theme-dark">
  <div class="app">
    <div class="form-area">
      <div class="form-header">
        <div class="title-section">
          <h1>Gerador de Notas</h1>
          <p class="subtitle">Todos os campos marcados como "Não aplicável" serão excluídos no texto final gerado</p>
        </div>
        <button class="theme-toggle" id="themeToggleBtn">🌙 Dark</button>
      </div>
      <div class="cards-grid" id="cardsGrid"></div>
    </div>
    <div class="sidebar">
      <div class="result-card">
        <div class="card-header-sidebar"><span>📄</span> Texto Gerado</div>
        <textarea id="resultado" rows="20" readonly></textarea>
        <div class="button-group">
          <button onclick="gerarTexto()">📄 Gerar</button>
          <button class="btn-success" onclick="copiarTexto()">📋 Copiar</button>
          <button class="btn-secondary" onclick="limparFormulario()">🗑️ Limpar</button>
        </div>
      </div>
      <div class="notes-card">
        <div class="card-header-sidebar"><span>📑</span> Anotações</div>
        <textarea id="blocoAnotacoes" placeholder="Suas anotações aqui..."></textarea>
        <button class="btn-secondary" onclick="apagarAnotacao()" style="margin-top: 12px; width: auto; align-self: flex-end;">🗑️ Apagar Anotação</button>
      </div>
    </div>
  </div>
  <script>
    const campos = [
      { header: "⚙️ Opções", type: "options" },
      { header: "⚠️ Motivo/Solicitação", id: "motivo" },
      { header: "🔐 Dados de verificação de conta", id: "dadosVerificacao" },
      { header: "🤔 Quem está entrando em contato", id: "Contato", checkbox: "naoAplicavelContato" },
      { header: "📧 E-mails fornecidos pelo cliente", id: "emailCliente", checkbox: "naoAplicavelEmail" },
      { header: "💻 Dispositivos utilizados", id: "dispositivosUtilizados" },
      { header: "📞 Telefone do cliente", id: "telefoneCliente", checkbox: "naoAplicavelTelefone", checked: true },
      { header: "🕗 Melhor Período", id: "melhorPeriodo", checkbox: "naoAplicavelPeriodo", checked: true },
      { header: "🕵️‍♂️ Status da Assinatura", id: "statusAssinatura", default: "• Início do atendimento: \n• Final do atendimento: " },
      { header: "📝 Etapas e resolução de problemas", id: "etapasResolucao" },
      { header: "✔️ Solução final e/ou próximas etapas", id: "solucaoProximasEtapas", default: "→ Sem dúvida, cx agradece e encerra." },
      { header: "📁 IKAs utilizados", id: "ikasUtilizados", checkbox: "naoAplicavelIKAs", checked: true },
      { header: "💸 Dados da cobrança", id: "dadosCobranca", default: "• Nome impresso no cartão: \n• Bandeira: \n• Últimos 4 dígitos: \n• Emissor do cartão: \n• Tipo de cartão: \n• Função: \n• Data da cobrança: \n• Valor cobrado: R$ ", checkbox: "naoAplicavelDadosCobranca", checked: true },
      { header: "💰 Motivo de solicitação de reembolso", id: "reembolso", checkbox: "naoAplicavelReembolso", checked: true },
      { header: "😇 Apaziguamento (benefício ou cortesia)", id: "apaziguamento", checkbox: "naoAplicavelApaziguamento", checked: true },
      { header: "📋 Tabulação", id: "tabulacao", checkbox: "naoAplicavelTabulacao", checked: true },
      { header: "🏷️ Tag", id: "tag", checkbox: "naoAplicavelTag", checked: true },
      { header: "🎬 Evidência anexada", type: "select", id: "evidencia", options: ["Não aplicável", "Sim"] },
      { header: "🗣 Feedback do cliente", id: "feedbackCliente", default: "Sem indício de feedback." },
      { header: "👀 Observação", id: "observacao", checkbox: "naoAplicavelObservacao", checked: true },
      { header: "📌 Status", type: "select", id: "status", options: ["Call back", "Customer didn't respond", "Customer disconnected", "Customer to provide more info", "Customer updated", "Duplicate ticket", "Holding for ticket review", "New", "No resolution found", "Redirected to partner", "Resolved", "Social bulk close", "Spam", "Unresolved"] }
    ];

    function gerarCards() {
      const container = document.getElementById('cardsGrid');
      campos.forEach(campo => {
        const card = document.createElement('div');
        card.className = 'card';
        const headerText = campo.header;
        const emoji = headerText.split(' ')[0];
        const title = headerText.substring(headerText.indexOf(' ') + 1);
        card.innerHTML = `<div class="card-header"><span>${emoji}</span><span>${title}</span></div>`;
        
        if (campo.type === 'options') {
          card.innerHTML += `<div class="checkbox-group"><input type="checkbox" id="removerEmojis"><label>Remover emojis do texto final</label></div>`;
        } else if (campo.type === 'select') {
          const select = document.createElement('select');
          select.id = campo.id;
          campo.options.forEach(opt => { 
            const option = document.createElement('option'); 
            option.value = opt; 
            option.textContent = opt; 
            if (opt === "Não aplicável") option.selected = true; 
            select.appendChild(option); 
          });
          card.appendChild(select);
        } else {
          const wrapper = campo.checkbox ? document.createElement('div') : null;
          if (wrapper) wrapper.className = 'field-with-checkbox';
          const textarea = document.createElement('textarea');
          textarea.id = campo.id;
          if (campo.default) textarea.value = campo.default;
          if (wrapper) wrapper.appendChild(textarea);
          else card.appendChild(textarea);
          if (campo.checkbox) {
            const cbDiv = document.createElement('div');
            cbDiv.className = 'checkbox-group';
            const cb = document.createElement('input');
            cb.type = 'checkbox';
            cb.id = campo.checkbox;
            if (campo.checked) cb.checked = true;
            const label = document.createElement('label');
            label.htmlFor = campo.checkbox;
            label.textContent = 'Não aplicável';
            cbDiv.appendChild(cb);
            cbDiv.appendChild(label);
            wrapper.appendChild(cbDiv);
            card.appendChild(wrapper);
          }
        }
        container.appendChild(card);
      });
    }
    gerarCards();

    function gerarTexto() {
      try {
        var textoFinal = "";
        var removerEmojis = document.getElementById('removerEmojis')?.checked || false;
        function adicionarEmoji(emoji) { return removerEmojis ? "" : emoji; }
        textoFinal += adicionarEmoji("⚠️") + " Motivo/Solicitação: " + (document.getElementById('motivo')?.value || "") + "\n\n";
        textoFinal += adicionarEmoji("🔐") + " Dados de verificação de conta: " + (document.getElementById('dadosVerificacao')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelContato')?.checked) textoFinal += adicionarEmoji("🤔") + " Quem está entrando em contato: " + (document.getElementById('Contato')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelEmail')?.checked) textoFinal += adicionarEmoji("📧") + " E-mails fornecidos pelo cliente: " + (document.getElementById('emailCliente')?.value || "") + "\n\n";
        textoFinal += adicionarEmoji("💻") + " Dispositivos utilizados: " + (document.getElementById('dispositivosUtilizados')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelTelefone')?.checked) textoFinal += adicionarEmoji("📞") + " Telefone do cliente: " + (document.getElementById('telefoneCliente')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelPeriodo')?.checked) textoFinal += adicionarEmoji("🕗") + " Melhor Período: " + (document.getElementById('melhorPeriodo')?.value || "") + "\n\n";
        textoFinal += adicionarEmoji("🕵️‍♂️") + " Status da Assinatura:\n\n" + (document.getElementById('statusAssinatura')?.value || "") + "\n\n";
        textoFinal += adicionarEmoji("📝") + " Etapas e resolução de problemas:\n\n" + (document.getElementById('etapasResolucao')?.value || "") + "\n\n";
        textoFinal += adicionarEmoji("✔️") + " Solução final e/ou próximas etapas:\n\n" + (document.getElementById('solucaoProximasEtapas')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelIKAs')?.checked) textoFinal += adicionarEmoji("📁") + " IKAs utilizados: " + (document.getElementById('ikasUtilizados')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelDadosCobranca')?.checked) textoFinal += adicionarEmoji("💸") + " Dados da cobrança:\n\n" + (document.getElementById('dadosCobranca')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelReembolso')?.checked) textoFinal += adicionarEmoji("💰") + " Motivo de solicitação de reembolso: " + (document.getElementById('reembolso')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelApaziguamento')?.checked) textoFinal += adicionarEmoji("😇") + " Apaziguamento (benefício ou cortesia): " + (document.getElementById('apaziguamento')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelTabulacao')?.checked) textoFinal += adicionarEmoji("📋") + " Tabulação: " + (document.getElementById('tabulacao')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelTag')?.checked) textoFinal += adicionarEmoji("🏷️") + " Tag: " + (document.getElementById('tag')?.value || "") + "\n\n";
        const evidencia = document.getElementById('evidencia')?.value;
        if (evidencia && evidencia !== "Não aplicável") textoFinal += adicionarEmoji("🎬") + " Evidência anexada: " + evidencia + "\n\n";
        textoFinal += adicionarEmoji("🗣") + " Feedback do cliente: " + (document.getElementById('feedbackCliente')?.value || "") + "\n\n";
        if (!document.getElementById('naoAplicavelObservacao')?.checked) textoFinal += adicionarEmoji("👀") + " Observação: " + (document.getElementById('observacao')?.value || "") + "\n\n";
        textoFinal += adicionarEmoji("📌") + "Status: " + (document.getElementById('status')?.value || "");
        document.getElementById('resultado').value = textoFinal;
      } catch(e) { alert("Erro ao gerar texto"); }
    }
    
    function copiarTexto() { 
      const r = document.getElementById('resultado'); 
      if(r.value.trim()){ 
        r.select(); 
        document.execCommand('copy'); 
        alert("✅ Copiado!"); 
      } else alert("Nada para copiar"); 
    }
    
    function limparFormulario() { 
      if(confirm("Limpar tudo?")){ 
        document.querySelectorAll('.form-area textarea:not(#resultado)').forEach(t=>t.value=''); 
        document.querySelectorAll('.form-area input[type="checkbox"]').forEach(c=>c.checked=false); 
        document.getElementById('evidencia').selectedIndex=0; 
        document.getElementById('resultado').value=''; 
        document.getElementById('statusAssinatura').value='• Início do atendimento: \n• Final do atendimento: '; 
        document.getElementById('solucaoProximasEtapas').value='→ Sem dúvida, cx agradece e encerra.'; 
        document.getElementById('feedbackCliente').value='Sem indício de feedback.'; 
        document.getElementById('dadosCobranca').value='• Nome impresso no cartão: \n• Bandeira: \n• Últimos 4 dígitos: \n• Emissor do cartão: \n• Tipo de cartão: \n• Função: \n• Data da cobrança: \n• Valor cobrado: R$ '; 
        ['Periodo','IKAs','DadosCobranca','Reembolso','Apaziguamento','Tabulacao','Tag','Observacao'].forEach(n=>{let cb=document.getElementById(`naoAplicavel${n}`); if(cb) cb.checked=true;}); 
        alert("Limpo!"); 
      } 
    }
    
    function apagarAnotacao() { 
      document.getElementById('blocoAnotacoes').value=''; 
      alert("Anotação apagada!"); 
    }

    function updateThemeButton() { 
      const isDark = document.body.classList.contains('theme-dark'); 
      document.getElementById('themeToggleBtn').innerHTML = isDark ? '☀️ Light' : '🌙 Dark'; 
    }
    
    const savedTheme = localStorage.getItem('theme') || 'dark';
    document.body.classList.add(`theme-${savedTheme}`);
    updateThemeButton();
    
    function toggleTheme() { 
      const isDark = document.body.classList.contains('theme-dark');
      if (isDark) {
        document.body.classList.remove('theme-dark');
        document.body.classList.add('theme-light');
        localStorage.setItem('theme', 'light');
      } else {
        document.body.classList.remove('theme-light');
        document.body.classList.add('theme-dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeButton();
    }
    
    document.getElementById('themeToggleBtn').addEventListener('click', toggleTheme);
  </script>
</body>
</html>
